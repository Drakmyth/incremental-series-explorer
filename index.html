<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Sum Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .controls {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .control-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item label {
            font-size: 14px;
            color: #a0aec0;
        }
        input[type="number"] {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 14px;
            width: 120px;
        }
        input[type="number"]::placeholder {
            color: #718096;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #63b3ed;
            background: rgba(99,179,237,0.2);
        }
        button {
            background: linear-gradient(135deg, #63b3ed 0%, #4299e1 100%);
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99,179,237,0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .chart-container {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            height: 500px;
        }
        #myChart {
            max-height: 100%;
        }
        .rate-info {
            background: rgba(99,179,237,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 15px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .rate-info:hover {
            background: rgba(99,179,237,0.3);
        }
        .rate-info.expanded {
            padding: 16px;
            background: rgba(99,179,237,0.25);
        }
        .rate-info span {
            font-weight: 600;
            color: #63b3ed;
        }
        .rate-changes-list {
            margin-top: 10px;
            font-size: 13px;
        }
        .rate-change-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
            margin: 4px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
        }
        .rate-change-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-small {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            width: 24px;
            height: 24px;
            padding: 0;
            font-size: 14px;
            cursor: pointer;
            color: #a0aec0;
            transition: all 0.2s ease;
        }
        .btn-small:hover {
            background: rgba(99,179,237,0.6);
            border-color: #63b3ed;
            color: #fff;
        }
        .btn-small.delete:hover {
            background: rgba(248,113,113,0.6);
            border-color: #f56565;
            color: #fff;
        }
        .add-rate-btn {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Growing Sum Visualizer</h1>

        <div class="controls">
            <div class="control-group">
                <div class="control-item">
                    <label for="initialValue">Starting Value:</label>
                    <input type="number" id="initialValue" value="1000" step="10" min="0">
                </div>
                <div class="control-item">
                    <label for="initialIncrease">Initial Increase:</label>
                    <input type="number" id="initialIncrease" value="50" step="10" min="-10000" max="100000">
                </div>
                <div class="control-item">
                    <label for="endTime">Number of Steps:</label>
                    <input type="number" id="endTime" value="10" step="1" min="1" max="100">
                </div>
            </div>
            <div class="control-group">
                <div class="control-item">
                    <label for="stepChange">Step:</label>
                    <input type="number" id="stepChange" value="1" step="1" min="0" max="100">
                </div>
                <div class="control-item">
                    <label for="increaseChange">Increase Amount:</label>
                    <input type="number" id="increaseChange" value="100" step="10" min="-10000" max="100000">
                </div>
                <button id="addIncreaseBtn">+ Add Change</button>
            </div>
            <button id="updateChartBtn">Update Chart</button>
        </div>

        <div class="rate-info" id="rateInfoBox">
            Current increase: <span id="currentIncreaseDisplay">50</span> per step
            <div class="rate-changes-list" id="rateChangesList" style="display: none;">
                <div id="rateChangesListInner"></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script>
        let chart;
        let rateChanges = [{ step: 0, increase: 50 }];
        let currentStep = 0; // Track next available step number for new rate changes

        // Get DOM elements
        const initialValueInput = document.getElementById('initialValue');
        const initialIncreaseInput = document.getElementById('initialIncrease');
        const stepChangeInput = document.getElementById('stepChange');
        const increaseChangeInput = document.getElementById('increaseChange');
        const endTimeInput = document.getElementById('endTime');
        const updateChartBtn = document.getElementById('updateChartBtn');
        const addIncreaseBtn = document.getElementById('addIncreaseBtn');
        const currentIncreaseDisplay = document.getElementById('currentIncreaseDisplay');
        const rateInfoBox = document.getElementById('rateInfoBox');
        const rateChangesList = document.getElementById('rateChangesList');
        const rateChangesListInner = document.getElementById('rateChangesListInner');

        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('myChart').getContext('2d');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Growing Sum',
                        data: [],
                        borderColor: '#63b3ed',
                        backgroundColor: 'rgba(99, 179, 237, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#63b3ed',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 800,
                        easing: 'easeOutQuart'
                    },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: '#a0aec0'
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#fff',
                            bodyColor: '#cbd5e0',
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y.toFixed(2);
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: {
                                color: '#a0aec0',
                                maxTicksLimit: 8
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        },
                        y: {
                            ticks: {
                                color: '#a0aec0'
                            },
                            grid: {
                                color: 'rgba(255,255,255,0.1)'
                            }
                        }
                    }
                }
            });
        }

        // Calculate the growing sum
        function calculateSum(dataPoints) {
            const result = new Array(dataPoints.length).fill(0);
            let currentValue = parseFloat(initialValueInput.value) || 0;
            let lastValue = currentValue;

            for (let i = 0; i < dataPoints.length; i++) {
                result[i] = currentValue;

        // Find next rate change
                const currentIncrease = initialIncreaseInput.value;
                let increase = parseFloat(currentIncrease) || 0;

                for (const rateChange of rateChanges) {
                    if (rateChange.step > 0 && rateChange.step <= dataPoints[i]) {
                        increase = rateChange.increase;
                    }
                }

                // Calculate next value by adding the increase
                currentValue = lastValue + increase;
                lastValue = currentValue;
            }

            return result;
        }

        // Generate data points
        function generateDataPoints(endValue) {
            const dataPoints = [];
            for (let i = 0; i <= endValue; i++) {
                dataPoints.push(i);
            }
            return dataPoints;
        }

        // Update current increase display and render rate changes list
        function updateCurrentIncrease() {
            let increase = parseFloat(initialIncreaseInput.value) || 0;
            for (const change of rateChanges) {
                if (change.step >= 0) {
                    increase = change.increase;
                }
            }
            currentIncreaseDisplay.textContent = increase;
            renderRateChangesList();
        }

        // Render the list of rate changes
        function renderRateChangesList() {
            if (rateChanges.length === 0) {
                rateChangesListInner.innerHTML = '';
                return;
            }

            const html = rateChanges.map((change, index) => {
                return `
                    <div class="rate-change-item">
                        <div class="rate-change-info">
                            <span>${change.step === 0 ? 'Initial' : 'Step ' + change.step}</span>
                            <input type="number" class="rate-change-input"
                                   data-index="${index}"
                                   value="${change.increase}"
                                   step="10" min="-10000" max="100000"
                                   style="width: 90px;">
                        </div>
                        ${change.step === 0 ? '' : `
                            <button class="btn-small delete" data-index="${index}" title="Delete">
                                &times;
                            </button>
                        `}
                    </div>
                `;
            }).join('');

            rateChangesListInner.innerHTML = html;

            // Wire up event listeners for edit inputs
            const editInputs = rateChangesListInner.querySelectorAll('.rate-change-input');
            editInputs.forEach(function(input) {
                input.addEventListener('input', function(e) {
                    const index = parseInt(e.target.dataset.index);
                    const value = parseFloat(e.target.value) || 0;
                    rateChanges[index].increase = value;
                    updateChart();
                });
            });

            // Wire up event listeners for delete buttons
            const deleteButtons = rateChangesListInner.querySelectorAll('.delete');
            deleteButtons.forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    const index = parseInt(e.target.dataset.index);
                    rateChanges.splice(index, 1);
                    updateChart();
                    renderRateChangesList();
                });
            });
        }

        // Main update function
        function updateChart() {
            const endValue = parseFloat(endTimeInput.value) || 10;
            const dataPoints = generateDataPoints(endValue);

            const sums = calculateSum(dataPoints);

            chart.data.labels = dataPoints;
            chart.data.datasets[0].data = sums;
            chart.update();

            // Also render the rate changes list after chart update
            renderRateChangesList();
        }

        // Add a new rate change
        function addRateChange() {
            const step = parseFloat(stepChangeInput.value);
            const increase = parseFloat(increaseChangeInput.value);
            if (step > rateChanges[rateChanges.length - 1].step) {
                rateChanges.push({ step: step, increase: increase });
                // Sort by step
                rateChanges.sort((a, b) => a.step - b.step);
                updateChart();
                updateCurrentIncrease();
            }
        }

        // Event listeners
        initialValueInput.addEventListener('input', updateChart);
        initialIncreaseInput.addEventListener('input', (e) => {
            e.preventDefault();
            updateChart();
            updateCurrentIncrease();
        });
        stepChangeInput.addEventListener('input', (e) => {
            e.preventDefault();
            addRateChange();
        });
        increaseChangeInput.addEventListener('input', (e) => {
            e.preventDefault();
            addRateChange();
        });
        endTimeInput.addEventListener('input', updateChart);
        updateChartBtn.addEventListener('click', updateChart);
        addIncreaseBtn.addEventListener('click', addRateChange);

        // Add expand/collapse listener for the rate info box
        rateInfoBox.addEventListener('click', (e) => {
            // Don't toggle if clicking a button or input inside
            if (e.target.closest('.delete') || e.target.closest('input')) {
                return;
            }
            const isExpanded = rateInfoBox.classList.contains('expanded');
            if (isExpanded) {
                rateInfoBox.classList.remove('expanded');
                rateChangesList.style.display = 'none';
            } else {
                rateInfoBox.classList.add('expanded');
                rateChangesList.style.display = 'block';
            }
        });

        // Toggle expand/collapse of rate changes list
        function toggleRateList() {
            const isExpanded = rateInfoBox.classList.contains('expanded');
            if (isExpanded) {
                rateInfoBox.classList.remove('expanded');
                rateChangesList.style.display = 'none';
            } else {
                rateInfoBox.classList.add('expanded');
                rateChangesList.style.display = 'block';
            }
        }

        // Add expand/collapse listener for the rate info box
        rateInfoBox.addEventListener('click', function(e) {
            // Don't toggle if clicking a button or input inside
            if (e.target.closest('.delete') || e.target.tagName === 'INPUT' || e.target.tagName === 'SPAN') {
                return;
            }
            toggleRateList();
        });

        // Initialize
        initChart();
        updateChart();
        updateCurrentIncrease();
    </script>
</body>
</html>
